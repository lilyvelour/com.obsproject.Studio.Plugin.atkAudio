id: com.obsproject.Studio.Plugin.atkAudio
branch: stable
runtime: com.obsproject.Studio
runtime-version: stable
sdk: org.kde.Sdk//6.8
build-extension: true
separate-locales: false
build-options:
  prefix: /app/plugins/atkAudio
  cflags: -Wno-error
  strip: true

modules:
  - name: atkaudio-plugin
    buildsystem: simple
    build-commands:
      - sed -i '/include(CTest)/c\# include(CTest)' CMakeLists.txt
      - sed -i '/add_subdirectory(tests)/c\# add_subdirectory(tests)' CMakeLists.txt
      - cmake -S . -B _build -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_INSTALL_PREFIX="${FLATPAK_DEST}" -DFETCHCONTENT_FULLY_DISCONNECTED=ON --compile-no-warning-as-error
      - cmake --build _build -j --config Release
    post-install:
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo
    sources:
      - type: archive
        url: https://github.com/atkAudio/PluginForObsRelease/archive/refs/tags/0.31.15.tar.gz
        sha256: fd1c09756356afcfae16313e978c0c2439688040ef66e740b2b66f218604af42
      - type: git
        url: https://github.com/juce-framework/JUCE.git
        commit: 29396c22c93392d6738e021b83196283d6e4d850
        dest: _deps/juce-src
      - type: file
        path: com.obsproject.Studio.Plugin.atkAudio.metainfo.xml
